name: Generate Pacman Animation

on:
  workflow_call:
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout output branch
        uses: actions/checkout@v3
        with:
          ref: output
          path: output

      - name: Generate Pacman SVG
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          output_file: output/latest-contribution.svg

      - name: Validate SVG
        run: |
          if [ ! -s "output/latest-contribution.svg" ]; then
            echo "Error: SVG file is empty!"
            exit 1
          fi
          if ! grep -q '<svg' output/latest-contribution.svg; then
            echo "Error: Invalid SVG content!"
            exit 1
          fi

      - name: Commit and push
        run: |
          cd output
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add latest-contribution.svg
          git commit -m "Update Pacman animation"
          git push
